function isPlainObject(value) {
  return Object.prototype.toString.call(value) === '[object Object]';
}

function cloneJsonCompatibleValue(value) {
  if (Array.isArray(value)) {
    return value.map(item => cloneJsonCompatibleValue(item));
  }

  if (isPlainObject(value)) {
    return Object.fromEntries(
      Object.entries(value).map(([key, item]) => [key, cloneJsonCompatibleValue(item)])
    );
  }

  return value;
}

function deepMergePlainObjects(target, source) {
  if (!isPlainObject(target) || !isPlainObject(source)) {
    return target;
  }

  Object.entries(source).forEach(([key, sourceValue]) => {
    if (isPlainObject(sourceValue)) {
      if (!isPlainObject(target[key])) {
        target[key] = {};
      }
      deepMergePlainObjects(target[key], sourceValue);
      return;
    }

    target[key] = cloneJsonCompatibleValue(sourceValue);
  });

  return target;
}

function latLngToUnitVector(lat, lng, target = new THREE.Vector3()) {
  const latRad = THREE.MathUtils.degToRad(lat);
  const lngRad = THREE.MathUtils.degToRad(lng);
  const cosLat = Math.cos(latRad);
  return target.set(
    Math.sin(lngRad) * cosLat,
    Math.sin(latRad),
    Math.cos(lngRad) * cosLat
  );
}

function slerpUnitVectors(a, b, t, target = new THREE.Vector3()) {
  const dot = THREE.MathUtils.clamp(a.dot(b), -1, 1);
  const omega = Math.acos(dot);
  const sinOmega = Math.sin(omega);

  if (sinOmega < 1e-6) {
    return target.copy(a).lerp(b, t).normalize();
  }

  const wa = Math.sin((1 - t) * omega) / sinOmega;
  const wb = Math.sin(t * omega) / sinOmega;
  return target.copy(a).multiplyScalar(wa).addScaledVector(b, wb).normalize();
}

function getArcPoint(startVec, endVec, arcAngle, altitudeAutoScale, t, globeRadius, target = new THREE.Vector3()) {
  const maxAltitude = Math.sin(arcAngle * 0.5) * altitudeAutoScale;
  const altitude = Math.sin(Math.PI * t) * maxAltitude;
  slerpUnitVectors(startVec, endVec, t, target);
  return target.multiplyScalar(globeRadius * (1 + altitude));
}

function getStableLinkPhase(startLat, startLng, endLat, endLng) {
  const seed = (startLat * 12.9898) + (startLng * 78.233) + (endLat * 37.719) + (endLng * 19.191);
  const x = Math.sin(seed) * 43758.5453123;
  return x - Math.floor(x);
}

const DASH_EASING_PRESETS = [
  'none',
  'cubic-out',
  'cubic-in-out',
  'quart-out',
  'quart-in-out',
  'quint-in-out'
];

function applyDashEasing(t, easingName) {
  const x = THREE.MathUtils.clamp(t, 0, 1);

  switch (easingName) {
    case 'none':
      return x;
    case 'cubic-out':
      return 1 - Math.pow(1 - x, 3);
    case 'cubic-in-out':
      return x < 0.5
        ? 4 * x * x * x
        : 1 - Math.pow(-2 * x + 2, 3) / 2;
    case 'quart-out':
      return 1 - Math.pow(1 - x, 4);
    case 'quart-in-out':
      return x < 0.5
        ? 8 * x * x * x * x
        : 1 - Math.pow(-2 * x + 2, 4) / 2;
    case 'quint-in-out':
      return x < 0.5
        ? 16 * x * x * x * x * x
        : 1 - Math.pow(-2 * x + 2, 5) / 2;
    default:
      return x;
  }
}

function normalizeDashGapPercent(rawGapValue) {
  const raw = toFiniteNumber(rawGapValue, 0);
  // Backward compatibility: old files used 0..1 for gap.
  const percent = raw <= 1 ? raw * 100 : raw;
  return THREE.MathUtils.clamp(percent, 0, 100);
}

function computeEffectiveDashLength(baseDashLength, gapPercent) {
  const gapNorm = THREE.MathUtils.clamp(gapPercent / 100, 0, 1);
  const smallDashLength = Math.max(0.01, baseDashLength * 0.12);
  return THREE.MathUtils.clamp(
    THREE.MathUtils.lerp(1, smallDashLength, gapNorm),
    0.01,
    1
  );
}

function solveRawDistanceForEasedDistance(targetDistance, lifecycleLength, easingName) {
  if (lifecycleLength <= 1e-6) {
    return 0;
  }
  const normalizedTarget = THREE.MathUtils.clamp(targetDistance / lifecycleLength, 0, 1);
  if (normalizedTarget <= 0) {
    return 0;
  }
  if (normalizedTarget >= 1) {
    return lifecycleLength;
  }

  let low = 0;
  let high = 1;
  for (let i = 0; i < 20; i += 1) {
    const mid = (low + high) * 0.5;
    const eased = applyDashEasing(mid, easingName);
    if (eased < normalizedTarget) {
      low = mid;
    } else {
      high = mid;
    }
  }

  return high * lifecycleLength;
}

function estimateArcLength(startVec, endVec, arcAngle, altitudeAutoScale, globeRadius, segments = 96) {
  const previousPoint = new THREE.Vector3();
  const currentPoint = new THREE.Vector3();
  getArcPoint(startVec, endVec, arcAngle, altitudeAutoScale, 0, globeRadius, previousPoint);

  let length = 0;
  for (let i = 1; i <= segments; i += 1) {
    const t = i / segments;
    getArcPoint(startVec, endVec, arcAngle, altitudeAutoScale, t, globeRadius, currentPoint);
    length += previousPoint.distanceTo(currentPoint);
    previousPoint.copy(currentPoint);
  }

  return length;
}

function getEndpointTrimFractions(
  startBaseRadius,
  endBaseRadius,
  startVec,
  endVec,
  arcAngle,
  altitudeAutoScale,
  globeRadius,
  startTrimOffset = 0,
  endTrimOffset = 0
) {
  const safeStartOffset = toFiniteNumber(startTrimOffset, 0);
  const safeEndOffset = toFiniteNumber(endTrimOffset, 0);
  const startTrimRadius = Math.max(0, toFiniteNumber(startBaseRadius, 0) + safeStartOffset);
  const endTrimRadius = Math.max(
    0,
    toFiniteNumber(endBaseRadius, 0) + safeEndOffset
  );
  const arcLength = estimateArcLength(startVec, endVec, arcAngle, altitudeAutoScale, globeRadius);
  if (arcLength <= 1e-6) {
    return {
      startFraction: 0,
      endFraction: 0
    };
  }

  let startFraction = startTrimRadius / arcLength;
  let endFraction = endTrimRadius / arcLength;
  const totalFraction = startFraction + endFraction;
  const maxTotalFraction = 0.9;

  if (totalFraction > maxTotalFraction) {
    const scale = maxTotalFraction / totalFraction;
    startFraction *= scale;
    endFraction *= scale;
  }

  return {
    startFraction: Math.min(0.45, Math.max(0, startFraction)),
    endFraction: Math.min(0.45, Math.max(0, endFraction))
  };
}

function clearLinkDashMeshes() {
  linkDashLayer.links.forEach(link => {
    link.dashes.forEach(dash => {
      dash.segments.forEach(mesh => {
        linkDashLayer.group.remove(mesh);
      });
      if (dash.jointCaps) {
        dash.jointCaps.forEach(jointCap => {
          linkDashLayer.group.remove(jointCap);
        });
      }
      if (dash.startCap) {
        linkDashLayer.group.remove(dash.startCap);
      }
      if (dash.endCap) {
        linkDashLayer.group.remove(dash.endCap);
      }
    });
  });
  linkDashLayer.links = [];
}

function clearLinkPathMeshes() {
  linkPathLayer.meshes.forEach(mesh => {
    disposeMesh(mesh, linkPathLayer.group);
  });
  linkPathLayer.meshes = [];

function rebuildLinkPathMeshes(linkData) {
  const perfStartMs = startPerfMeasure();
  clearLinkPathMeshes();

  if (!linkData.length) {
    endPerfMeasure('rebuildLinkPathMeshes', perfStartMs);
    return;
  }

  const globeRadius = getGlobeRadius();
  const altitudeAutoScale = CONFIG.locations.linkSettings.arcAltitudeAutoScale;
  const curveResolution = THREE.MathUtils.clamp(
    Math.round(CONFIG.locations.linkSettings.arcCurveResolution),
    24,
    512
  );

  linkData.forEach(link => {
    const startVec = latLngToUnitVector(link.startLat, link.startLng);
    const endVec = latLngToUnitVector(link.endLat, link.endLng);
    const arcAngle = Math.acos(THREE.MathUtils.clamp(startVec.dot(endVec), -1, 1));
    const { startFraction, endFraction } = getEndpointTrimFractions(
      link.startRadius,
      link.endRadius,
      startVec,
      endVec,
      arcAngle,
      altitudeAutoScale,
      globeRadius,
      link.startTrimOffset,
      link.endTrimOffset
    );
    const trimStartT = startFraction;
    const trimEndT = 1 - endFraction;
    if (trimEndT <= trimStartT) {
      return;
    }
    const points = [];

    for (let i = 0; i <= curveResolution; i += 1) {
      const t = trimStartT + ((trimEndT - trimStartT) * (i / curveResolution));
      const point = getArcPoint(
        startVec,
        endVec,
        arcAngle,
        altitudeAutoScale,
        t,
        globeRadius,
        new THREE.Vector3()
      );
      points.push(point);
    }

    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({
      color: link.color || '#ffffff',
      transparent: true,
      opacity: 0.95
    });
    const pathLine = new THREE.Line(geometry, material);
    pathLine.castShadow = false;
    pathLine.receiveShadow = false;
    linkPathLayer.group.add(pathLine);
    linkPathLayer.meshes.push(pathLine);
  });
  endPerfMeasure('rebuildLinkPathMeshes', perfStartMs);
}

function updateLinkLayerVisibility() {
  const showPaths = CONFIG.locations.editLocations || locationDrag.isActive;
  if (showPaths) {
    linkDashLayer.group.visible = false;
    linkPathLayer.group.visible = true;
    return;
  }

  const showDashes = !!CONFIG.locations.showDashes;
  if (showDashes && locationRenderState.dashRebuildPending) {
    rebuildLinkDashMeshes(locationRenderState.latestLinkData);
    locationRenderState.dashRebuildPending = false;
  }
  linkDashLayer.group.visible = showDashes;
  linkPathLayer.group.visible = false;
}

function computeLinkVisibilityStateKey() {
  const showPaths = CONFIG.locations.editLocations || locationDrag.isActive;
  const showDashes = !!CONFIG.locations.showDashes;
  const dashNeedsRebuild = locationRenderState.dashRebuildPending;
  return `${showPaths ? 1 : 0}|${showDashes ? 1 : 0}|${dashNeedsRebuild ? 1 : 0}`;
}

function refreshLinkLayerVisibilityIfNeeded(force = false) {
  const nextKey = computeLinkVisibilityStateKey();
  if (!force && nextKey === locationRenderState.visibilityKey) {
    return false;
  }
  locationRenderState.visibilityKey = nextKey;
  updateLinkLayerVisibility();
  return true;
}

function rebuildLinkDashMeshes(linkData) {
  const perfStartMs = startPerfMeasure();
  clearLinkDashMeshes();

  if (!linkData.length) {
    endPerfMeasure('rebuildLinkDashMeshes', perfStartMs);
    return;
  }

  const baseDashLength = THREE.MathUtils.clamp(CONFIG.locations.linkSettings.arcDashLength, 0.01, 1);
  const dashGapPercent = normalizeDashGapPercent(CONFIG.locations.linkSettings.arcDashGap);
  const gapNorm = dashGapPercent / 100;
  const dashLength = computeEffectiveDashLength(baseDashLength, dashGapPercent);
  const estimatedCycle = Math.max(0.05, dashLength + (gapNorm * 1.5));
  const requestedDashCount = Math.max(12, Math.ceil((1 + dashLength) / estimatedCycle) + 8);
  const maxDashCount = Math.max(1, Math.round(CONFIG.locations.linkSettings.arcCurveResolution));
  const dashCount = Math.min(requestedDashCount, maxDashCount);
  const strokeRadius = Math.max(0.02, CONFIG.locations.linkSettings.arcStroke * 0.5);
  const radialSegments = Math.max(8, Math.round(CONFIG.locations.linkSettings.arcCircularResolution));
  const capHeightSegments = Math.max(6, Math.round(radialSegments * 0.6));
  const geometryResources = ensureDashGeometryResources(strokeRadius, radialSegments, capHeightSegments);
  const globeRadius = getGlobeRadius();
  const altitudeAutoScale = CONFIG.locations.linkSettings.arcAltitudeAutoScale;
  const dashSegmentCount = THREE.MathUtils.clamp(
    Math.round(CONFIG.locations.linkSettings.arcCurveResolution / 4),
    6,
    64
  );

  linkData.forEach(link => {
    const startVec = latLngToUnitVector(link.startLat, link.startLng);
    const endVec = latLngToUnitVector(link.endLat, link.endLng);
    const arcAngle = Math.acos(THREE.MathUtils.clamp(startVec.dot(endVec), -1, 1));
    const { startFraction, endFraction } = getEndpointTrimFractions(
      link.startRadius,
      link.endRadius,
      startVec,
      endVec,
      arcAngle,
      altitudeAutoScale,
      globeRadius,
      link.startTrimOffset,
      link.endTrimOffset
    );
    const trimStartT = startFraction;
    const trimEndT = 1 - endFraction;
    if (trimEndT <= trimStartT) {
      return;
    }
    const phase = getStableLinkPhase(link.startLat, link.startLng, link.endLat, link.endLng);
    const dashes = [];
    const dashColor = link.color || '#ffffff';
    const dashMaterial = getDashMaterial(dashColor);

    for (let i = 0; i < dashCount; i += 1) {
      const segments = [];
      for (let segmentIndex = 0; segmentIndex < dashSegmentCount; segmentIndex += 1) {
        const mesh = new THREE.Mesh(geometryResources.segmentGeometry, dashMaterial);
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        mesh.userData.baseLength = 1;
        mesh.visible = false;
        linkDashLayer.group.add(mesh);
        segments.push(mesh);
      }

      const startCap = new THREE.Mesh(
        geometryResources.capGeometry,
        dashMaterial
      );
      startCap.castShadow = false;
      startCap.receiveShadow = false;
      startCap.visible = false;
      linkDashLayer.group.add(startCap);

      const endCap = new THREE.Mesh(
        geometryResources.capGeometry,
        dashMaterial
      );
      endCap.castShadow = false;
      endCap.receiveShadow = false;
      endCap.visible = false;
      linkDashLayer.group.add(endCap);

      const jointCaps = [];
      for (let jointIndex = 0; jointIndex < dashSegmentCount - 1; jointIndex += 1) {
        const jointCap = new THREE.Mesh(
          geometryResources.jointCapGeometry,
          dashMaterial
        );
        jointCap.castShadow = false;
        jointCap.receiveShadow = false;
        jointCap.visible = false;
        linkDashLayer.group.add(jointCap);
        jointCaps.push(jointCap);
      }

      const samplePoints = Array.from({ length: dashSegmentCount + 1 }, () => new THREE.Vector3());

      dashes.push({
        segments,
        jointCaps,
        startCap,
        endCap,
        samplePoints
      });
    }

    if (dashes.length) {
      linkDashLayer.links.push({
        startVec,
        endVec,
        arcAngle,
        trimStartT,
        trimEndT,
        phase,
        dashes,
        color: link.color || '#ffbcd7'
      });
    }
  });
  endPerfMeasure('rebuildLinkDashMeshes', perfStartMs);
}

function updateLinkDashMeshes(timeMs) {
  if (!linkDashLayer.group.visible) {
    return;
  }
  if (!linkDashLayer.links.length) {
    return;
  }

  const baseDashLength = THREE.MathUtils.clamp(CONFIG.locations.linkSettings.arcDashLength, 0.01, 1);
  const dashGapPercent = normalizeDashGapPercent(CONFIG.locations.linkSettings.arcDashGap);
  const gapNorm = dashGapPercent / 100;
  const dashLength = computeEffectiveDashLength(baseDashLength, dashGapPercent);
  const animateTime = CONFIG.locations.linkSettings.arcDashAnimateTime;
  const delayMs = Math.max(0, Number(CONFIG.locations.linkSettings.arcDashDelayMs) || 0);
  const delayDistance = animateTime > 0 ? (delayMs / animateTime) : 0;
  const linearPhase = animateTime > 0 ? (timeMs / animateTime) : 0;
  const easingName = CONFIG.locations.linkSettings.arcDashEasing || 'cubic-out';
  const globeRadius = getGlobeRadius();
  const altitudeAutoScale = CONFIG.locations.linkSettings.arcAltitudeAutoScale;

  const hideDash = dash => {
    dash.segments.forEach(mesh => {
      mesh.visible = false;
    });
    dash.jointCaps.forEach(jointCap => {
      jointCap.visible = false;
    });
    dash.startCap.visible = false;
    dash.endCap.visible = false;
  };

  linkDashLayer.links.forEach(link => {
    const minVisibleT = link.trimStartT ?? 0;
    const maxVisibleT = link.trimEndT ?? 1;
    const visibleRange = Math.max(0, maxVisibleT - minVisibleT);
    if (visibleRange <= 1e-6) {
      link.dashes.forEach(hideDash);
      return;
    }

    const lifecycleLength = visibleRange + dashLength;
    if (lifecycleLength <= 1e-6) {
      link.dashes.forEach(hideDash);
      return;
    }

    const impactRawDistance = easingName === 'none'
      ? visibleRange
      : solveRawDistanceForEasedDistance(
        visibleRange,
        lifecycleLength,
        easingName
      );
    const gapSpacingDistance = gapNorm * 1.5;
    const cycle = Math.max(0.0001, impactRawDistance + delayDistance + gapSpacingDistance);

    const drive = linearPhase + link.phase;
    const nMin = Math.ceil((drive - lifecycleLength) / cycle);
    const nMax = Math.floor(drive / cycle);
    let visibleDashIndex = 0;

    for (let n = nMin; n <= nMax && visibleDashIndex < link.dashes.length; n += 1) {
      const rawDistance = drive - (n * cycle);
      if (rawDistance < 0 || rawDistance > lifecycleLength) {
        continue;
      }

      const lifecycleProgress = THREE.MathUtils.clamp(rawDistance / lifecycleLength, 0, 1);
      const easedDistance = easingName === 'none'
        ? rawDistance
        : applyDashEasing(lifecycleProgress, easingName) * lifecycleLength;
      const startLocalT = easingName === 'none'
        ? Math.max(0, easedDistance - dashLength)
        : Math.max(0, easedDistance - dashLength) + Math.max(0, easedDistance - visibleRange);
      const endLocalT = easingName === 'none'
        ? Math.min(visibleRange, easedDistance)
        : Math.min(visibleRange, easedDistance) + Math.max(0, easedDistance - visibleRange);

      const startT = minVisibleT + startLocalT;
      const endT = minVisibleT + endLocalT;

      if (endT <= startT) {
        continue;
      }

      const dash = link.dashes[visibleDashIndex];
      visibleDashIndex += 1;

      const dashRange = endT - startT;
      if (dashRange <= 1e-6) {
        hideDash(dash);
        continue;
      }
      const segmentCount = dash.segments.length;
      const pointCount = dash.samplePoints.length;

      for (let pointIndex = 0; pointIndex < pointCount; pointIndex += 1) {
        const t = startT + (pointIndex / (pointCount - 1)) * dashRange;
        getArcPoint(
          link.startVec,
          link.endVec,
          link.arcAngle,
          altitudeAutoScale,
          t,
          globeRadius,
          dash.samplePoints[pointIndex]
        );
      }

      dash.startCap.visible = true;
      dash.endCap.visible = true;
      dash.startCap.position.copy(dash.samplePoints[0]);
      dash.endCap.position.copy(dash.samplePoints[pointCount - 1]);
      dash.jointCaps.forEach((jointCap, jointIndex) => {
        jointCap.visible = true;
        jointCap.position.copy(dash.samplePoints[jointIndex + 1]);
      });

      dash.segments.forEach((mesh, segmentIndex) => {
        dashTempStart.copy(dash.samplePoints[segmentIndex]);
        dashTempEnd.copy(dash.samplePoints[segmentIndex + 1]);

        dashTempMid.copy(dashTempStart).add(dashTempEnd).multiplyScalar(0.5);
        dashTempDir.copy(dashTempEnd).sub(dashTempStart);
        const segmentLength = dashTempDir.length();
        if (segmentLength <= 1e-4) {
          mesh.visible = false;
          return;
        }

        mesh.visible = true;
        dashTempDir.divideScalar(segmentLength);
        dashTempQuat.setFromUnitVectors(dashUp, dashTempDir);

        mesh.position.copy(dashTempMid);
        mesh.quaternion.copy(dashTempQuat);
        // Slight overlap between adjacent segments to avoid subpixel gaps.
        mesh.scale.set(1, Math.max(0.0001, (segmentLength / mesh.userData.baseLength) * 1.04), 1);
      });
    }

    for (let i = visibleDashIndex; i < link.dashes.length; i += 1) {
      hideDash(link.dashes[i]);
    }
  });
}

function getLocationCoordinates(location) {
  return {
    lat: toFiniteNumber(location?.lat, 0),
    lng: toFiniteNumber(location?.lng, 0)
  };
}

function getLocationDimensions(location, defaults, isEditMode) {
  const widthBase = toFiniteNumber(location?.width, defaults.width);
  const heightBase = toFiniteNumber(location?.height, defaults.height);
  return {
    width: isEditMode ? Math.max(5, widthBase) : widthBase,
    height: isEditMode ? Math.max(10, heightBase) : heightBase
  };
}

function applyLocationSettings() {
  const perfStartMs = startPerfMeasure();
  const markerData = [];
  const linkData = [];
  const hubPoints = [];
  const editMode = !!CONFIG.locations.editLocations;
  const showLocationObjects = !!CONFIG.locations.showLocations || editMode;
  const hubColor = CONFIG.locations.styling.hubColor || '#0dd4ac';
  const siteColor = CONFIG.locations.styling.siteColor || '#ffffff';
  const dashColor = CONFIG.locations.styling.dashColor || '#ffbcd7';
  const hubTrimOffset = toFiniteNumber(CONFIG.locations.linkSettings.hubTrimOffset, 0);
  const siteTrimOffset = toFiniteNumber(CONFIG.locations.linkSettings.siteTrimOffset, 0);

  CONFIG.locations.groups.forEach(group => {
    if (!group || !group.hub) {
      return;
    }

    const hubCoords = getLocationCoordinates(group.hub);
    const hubSize = getLocationDimensions(group.hub, CONFIG.locations.hubDefaults, editMode);

    hubPoints.push({
      groupId: group.id,
      lat: hubCoords.lat,
      lng: hubCoords.lng,
      radius: hubSize.width
    });

    if (showLocationObjects) {
      markerData.push({
        kind: 'hub',
        locationId: group.hub.id,
        lat: hubCoords.lat,
        lng: hubCoords.lng,
        color: hubColor,
        size: hubSize.width,
        height: hubSize.height,
        opacity: editMode ? 0.7 : 1
      });
    }

    (group.sites || []).forEach(site => {
      const siteCoords = getLocationCoordinates(site);
      const siteSize = getLocationDimensions(site, CONFIG.locations.siteDefaults, editMode);

      if (showLocationObjects) {
        markerData.push({
          kind: 'site',
          locationId: site.id,
          lat: siteCoords.lat,
          lng: siteCoords.lng,
          color: siteColor,
          size: siteSize.width,
          height: siteSize.height,
          opacity: editMode ? 0.7 : 1
        });
      }

      linkData.push({
        startLat: hubCoords.lat,
        startLng: hubCoords.lng,
        endLat: siteCoords.lat,
        endLng: siteCoords.lng,
        startRadius: hubSize.width,
        endRadius: siteSize.width,
        startTrimOffset: hubTrimOffset,
        endTrimOffset: siteTrimOffset,
        color: dashColor
      });
    });
  });

  CONFIG.locations.groups.forEach(group => {
    if (!group?.targetOtherHubs || !group?.hub) {
      return;
    }

    const sourceCoords = getLocationCoordinates(group.hub);
    const sourceSize = getLocationDimensions(group.hub, CONFIG.locations.hubDefaults, editMode);

    hubPoints.forEach(targetHub => {
      if (targetHub.groupId === group.id) {
        return;
      }
      linkData.push({
        startLat: sourceCoords.lat,
        startLng: sourceCoords.lng,
        endLat: targetHub.lat,
        endLng: targetHub.lng,
        startRadius: sourceSize.width,
        endRadius: targetHub.radius,
        startTrimOffset: hubTrimOffset,
        endTrimOffset: hubTrimOffset,
        color: dashColor
      });
    });
  });

  locationRenderState.latestLinkData = linkData;
  const showPaths = editMode || locationDrag.isActive;
  if (showPaths) {
    rebuildLinkPathMeshes(linkData);
    locationRenderState.dashRebuildPending = true;
  } else {
    clearLinkPathMeshes();
    if (CONFIG.locations.showDashes) {
      rebuildLinkDashMeshes(linkData);
      locationRenderState.dashRebuildPending = false;
    } else {
      locationRenderState.dashRebuildPending = true;
    }
  }
  refreshLinkLayerVisibilityIfNeeded(true);

  globe
  .pointsData([])
  .arcsData([])
  .arcsTransitionDuration(0)
  .objectsData(markerData)
    .objectLat('lat')
    .objectLng('lng')
    .objectAltitude(d => {
      const surfaceDistance = d.surfaceDistance ?? CONFIG.locations.distanceFromSurface;
      return Math.max(-0.99, surfaceDistance);
    })
    .objectFacesSurface(true)
    .objectThreeObject(d => {
      const radius = d.size;
      const height = d.height;
      const color = d.color || '#ffffff';
      const opacity = d.opacity ?? 1;

      const group = new THREE.Group();
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, height, CONFIG.locations.circleResolution),
        new THREE.MeshBasicMaterial({
          color,
          transparent: opacity < 1,
          opacity
        })
      );
      // Align cylinder axis (+Y) to face outward along globe normal (+Z after facesSurface transform),
      // then shift it so the base sits exactly on the group's origin.
      mesh.rotation.x = Math.PI / 2;
      mesh.position.z = height / 2;
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      mesh.userData.locationId = d.locationId;
      group.userData.locationId = d.locationId;
      group.add(mesh);
      return group;
    });
  // ThreeGlobe data updates can recreate internals; re-apply configured transform.
  applyGlobeTransformSettings();
  endPerfMeasure('applyLocationSettings', perfStartMs);
}

function applyLightsSettings() {
  if (!CONFIG.lights.enabled) {
    if (ambientLight) {
      scene.remove(ambientLight);
      ambientLight = null;
    }

    if (dirLight) {
      scene.remove(dirLight);
      dirLight = null;
    }
    return;
  }

  if (!ambientLight) {
    ambientLight = new THREE.AmbientLight();
    scene.add(ambientLight);
  }

  if (!dirLight) {
    dirLight = new THREE.DirectionalLight();
    dirLight.castShadow = false;
    scene.add(dirLight);
  }

  ambientLight.color.set(CONFIG.lights.ambientColor);
  ambientLight.intensity = CONFIG.lights.ambientIntensity;

  dirLight.color.set(CONFIG.lights.directionalColor);
  dirLight.intensity = CONFIG.lights.directionalIntensity;
  dirLight.position.set(
    CONFIG.lights.directionalPosition.x,
    CONFIG.lights.directionalPosition.y,
    CONFIG.lights.directionalPosition.z
  );
}

// Interaction
const globeDrag = {
  isActive: false,
  lastX: 0,
  lastY: 0,
  velocityX: 0,
  velocityY: 0
};
const locationDrag = {
  isActive: false,
  locationId: ''
};
const locationClickToAdd = {
  isPointerDown: false,
  pointerId: null,
  startX: 0,
  startY: 0,
  moved: false,
  startedOnLocation: false
};
const LOCATION_CLICK_ADD_DRAG_THRESHOLD_PX = 6;
const raycaster = new THREE.Raycaster();
const pointerNdc = new THREE.Vector2();
const globeWorldCenter = new THREE.Vector3();
const globeWorldScale = new THREE.Vector3();
const globeSurfaceHit = new THREE.Vector3();
const globeLocalHit = new THREE.Vector3();

function scheduleLocationSettingsApply() {
  locationRenderState.applyScheduled = true;
  if (locationRenderState.applyRafId) {
    return;
  }
  locationRenderState.applyRafId = requestAnimationFrame(() => {
    locationRenderState.applyRafId = 0;
    if (!locationRenderState.applyScheduled) {
      return;
    }
    locationRenderState.applyScheduled = false;
    applyLocationSettings();
  });
}

function cancelScheduledLocationSettingsApply() {
  if (locationRenderState.applyRafId) {
    cancelAnimationFrame(locationRenderState.applyRafId);
    locationRenderState.applyRafId = 0;
  }
  locationRenderState.applyScheduled = false;
}

applyRendererSettings();
applyCameraSettings();
applyControlsSettings();
applyGlobeSettings();
applyMaterialSettings();
applyLightsSettings();

function setPointerNdcFromClientPosition(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointerNdc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointerNdc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
}

function findLocationIdFromObject(object) {
  let current = object;
  while (current) {
    if (current.userData?.locationId) {
      return current.userData.locationId;
    }
    current = current.parent;
  }
  return '';
}

function getPointerLocationId(event) {
  setPointerNdcFromClientPosition(event.clientX, event.clientY);
  raycaster.setFromCamera(pointerNdc, camera);
  const intersections = raycaster.intersectObject(globe, true);
  for (const intersection of intersections) {
    const locationId = findLocationIdFromObject(intersection.object);
    if (locationId) {
      return locationId;
    }
  }
  return '';
}

function findLocationById(locationId) {
  for (const group of CONFIG.locations.groups) {
    if (group?.hub?.id === locationId) {
      return group.hub;
    }
    const site = (group?.sites || []).find(candidate => candidate.id === locationId);
    if (site) {
      return site;
    }
  }
  return null;
}

function findLocationGroupById(groupId) {
  return CONFIG.locations.groups.find(group => group?.id === groupId) || null;
}

function findLocationGroupContextByLocationId(locationId) {
  for (const group of CONFIG.locations.groups) {
    if (group?.hub?.id === locationId) {
      return {
        group,
        isHub: true,
        siteIndex: -1
      };
    }

    const siteIndex = (group?.sites || []).findIndex(site => site?.id === locationId);
    if (siteIndex >= 0) {
      return {
        group,
        isHub: false,
        siteIndex
      };
    }
  }

  return null;
}

function getLocationGroupDisplayName(group) {
  const name = typeof group?.hubName === 'string' ? group.hubName.trim() : '';
  return name || 'this group';
}

function confirmAndRemoveLocationGroup(groupId) {
  const group = findLocationGroupById(groupId);
  if (!group) {
    return false;
  }

  const groupName = getLocationGroupDisplayName(group);
  const confirmed = window.confirm(`Remove location group "${groupName}" and all connected sites?`);
  if (!confirmed) {
    return false;
  }

  CONFIG.locations.groups = CONFIG.locations.groups.filter(existing => existing.id !== groupId);
  applyLocationSettings();
  refreshLocationUi();
  return true;
}

function removeSiteByLocationId(locationId) {
  const context = findLocationGroupContextByLocationId(locationId);
  if (!context || context.isHub) {
    return false;
  }

  const sites = Array.isArray(context.group.sites) ? context.group.sites : [];
  if (context.siteIndex < 0 || context.siteIndex >= sites.length) {
    return false;
  }

  sites.splice(context.siteIndex, 1);
  applyLocationSettings();
  refreshLocationUi();
  return true;
}

function getGlobeLatLngFromClientPosition(clientX, clientY) {
  setPointerNdcFromClientPosition(clientX, clientY);
  raycaster.setFromCamera(pointerNdc, camera);

  globe.getWorldPosition(globeWorldCenter);
  globe.getWorldScale(globeWorldScale);
  const worldRadius = getGlobeRadius() * globeWorldScale.x;
  const globeSphere = new THREE.Sphere(globeWorldCenter, worldRadius);

  if (!raycaster.ray.intersectSphere(globeSphere, globeSurfaceHit)) {
    return null;
  }

  globeLocalHit.copy(globeSurfaceHit);
  globe.worldToLocal(globeLocalHit);

  const radius = globeLocalHit.length();
  if (!radius) {
    return null;
  }

  const lat = THREE.MathUtils.radToDeg(Math.asin(THREE.MathUtils.clamp(globeLocalHit.y / radius, -1, 1)));
  let lng = THREE.MathUtils.radToDeg(Math.atan2(globeLocalHit.x, globeLocalHit.z));
  lng = ((lng + 540) % 360) - 180;

  return { lat, lng };
}

function getViewportCenterGlobeLatLng() {
  const rect = renderer.domElement.getBoundingClientRect();
  const centerX = rect.left + (rect.width * 0.5);
  const centerY = rect.top + (rect.height * 0.5);
  return getGlobeLatLngFromClientPosition(centerX, centerY);
}

function addSiteToSelectedGroupAtPointer(event) {
  const targetGroupId = CONFIG.locations.clickToAddGroupId;
  if (!targetGroupId) {
    return;
  }

  const targetGroup = findLocationGroupById(targetGroupId);
  if (!targetGroup) {
    return;
  }

  const latLng = getGlobeLatLngFromClientPosition(event.clientX, event.clientY);
  if (!latLng) {
    return;
  }

  if (!Array.isArray(targetGroup.sites)) {
    targetGroup.sites = [];
  }

  targetGroup.sites.push({
    id: nextSiteId(),
    lat: latLng.lat,
    lng: latLng.lng,
    width: CONFIG.locations.siteDefaults.width,
    height: CONFIG.locations.siteDefaults.height
  });

  applyLocationSettings();
  refreshLocationUi();
}

function resetLocationClickToAddState() {
  locationClickToAdd.isPointerDown = false;
  locationClickToAdd.pointerId = null;
  locationClickToAdd.startX = 0;
  locationClickToAdd.startY = 0;
  locationClickToAdd.moved = false;
  locationClickToAdd.startedOnLocation = false;
}

function updateDraggedMarkerCoordinates(event) {
  if (!CONFIG.locations.editLocations) {
    return;
  }

  const location = findLocationById(locationDrag.locationId);
  if (!location) {
    return;
  }

  const latLng = getGlobeLatLngFromClientPosition(event.clientX, event.clientY);
  if (!latLng) {
    return;
  }

  const nextLat = latLng.lat;
  const nextLng = latLng.lng;
  if (
    Math.abs(toFiniteNumber(location.lat, 0) - nextLat) < 1e-6
    && Math.abs(toFiniteNumber(location.lng, 0) - nextLng) < 1e-6
  ) {
    return;
  }

  location.lat = nextLat;
  location.lng = nextLng;
  scheduleLocationSettingsApply();
}

renderer.domElement.addEventListener('pointerdown', event => {
  if (event.button !== 0) {
    return;
  }

  locationClickToAdd.isPointerDown = true;
  locationClickToAdd.pointerId = event.pointerId;
  locationClickToAdd.startX = event.clientX;
  locationClickToAdd.startY = event.clientY;
  locationClickToAdd.moved = false;
  locationClickToAdd.startedOnLocation = false;

  const locationId = getPointerLocationId(event);
  if (locationId && CONFIG.locations.editLocations) {
    locationClickToAdd.startedOnLocation = true;
    locationDrag.isActive = true;
    locationDrag.locationId = locationId;
    globeDrag.isActive = false;
    globeDrag.velocityX = 0;
    globeDrag.velocityY = 0;
    applyLocationSettings();
    updateDraggedMarkerCoordinates(event);
    return;
  }

  if (event.button !== 0 || (!CONFIG.controls.enableRotate && !CONFIG.controls.enablePan)) {
    return;
  }
  if (locationDrag.isActive) {
    return;
  }
  globeDrag.isActive = true;
  globeDrag.lastX = event.clientX;
  globeDrag.lastY = event.clientY;
  globeDrag.velocityX = 0;
  globeDrag.velocityY = 0;
});

renderer.domElement.addEventListener('pointermove', event => {
  if (
    locationClickToAdd.isPointerDown
    && locationClickToAdd.pointerId === event.pointerId
    && !locationClickToAdd.moved
  ) {
    const deltaX = event.clientX - locationClickToAdd.startX;
    const deltaY = event.clientY - locationClickToAdd.startY;
    const movedDistanceSq = (deltaX * deltaX) + (deltaY * deltaY);
    if (movedDistanceSq >= LOCATION_CLICK_ADD_DRAG_THRESHOLD_PX * LOCATION_CLICK_ADD_DRAG_THRESHOLD_PX) {
      locationClickToAdd.moved = true;
    }
  }

  if (locationDrag.isActive) {
    updateDraggedMarkerCoordinates(event);
    return;
  }

  if (!globeDrag.isActive) {
    return;
  }

  const deltaX = event.clientX - globeDrag.lastX;
  const deltaY = event.clientY - globeDrag.lastY;
  const sensitivity = CONFIG.controls.globeDragSensitivity;

  if (CONFIG.controls.enableRotationX) {
    const velocityY = deltaX * sensitivity;
    CONFIG.globe.rotationY += velocityY;
    globeDrag.velocityY = velocityY;
  }

  if (CONFIG.controls.enableRotationY) {
    const velocityX = deltaY * sensitivity;
    CONFIG.globe.rotationX += velocityX;
    globeDrag.velocityX = velocityX;
  }

  globeDrag.lastX = event.clientX;
  globeDrag.lastY = event.clientY;
});

renderer.domElement.addEventListener('wheel', event => {
  if (!CONFIG.controls.enableRotate) {
    return;
  }
  if (locationDrag.isActive) {
    return;
  }

  // Touchpads emit wheel deltas for two-finger gestures.
  const sensitivity = CONFIG.controls.globeDragSensitivity;
  const deltaX = event.deltaX;
  const deltaY = event.deltaY;
  let didRotate = false;

  if (CONFIG.controls.enableRotationX) {
    CONFIG.globe.rotationY -= deltaX * sensitivity;
    didRotate = true;
  }

  if (CONFIG.controls.enableRotationY) {
    CONFIG.globe.rotationX -= deltaY * sensitivity;
    didRotate = true;
  }

  if (didRotate) {
    event.preventDefault();
  }
}, { passive: false });

function stopGlobeDrag() {
  globeDrag.isActive = false;
}

function stopLocationDrag() {
  if (!locationDrag.isActive) {
    return;
  }
  cancelScheduledLocationSettingsApply();
  locationDrag.isActive = false;
  locationDrag.locationId = '';
  applyLocationSettings();
  refreshLocationUi();
}

function handlePointerUp(event) {
  const isTrackedPointer = locationClickToAdd.isPointerDown && locationClickToAdd.pointerId === event.pointerId;
  const shouldAddSite = isTrackedPointer
    && event.button === 0
    && CONFIG.locations.editLocations
    && !locationClickToAdd.startedOnLocation
    && !locationClickToAdd.moved;

  stopGlobeDrag();
  stopLocationDrag();

  if (shouldAddSite) {
    addSiteToSelectedGroupAtPointer(event);
  }

  if (isTrackedPointer) {
    resetLocationClickToAddState();
  }
}

function handlePointerCancel() {
  stopGlobeDrag();
  stopLocationDrag();
  resetLocationClickToAddState();
}

renderer.domElement.addEventListener('pointerup', handlePointerUp);
renderer.domElement.addEventListener('pointerleave', handlePointerCancel);
renderer.domElement.addEventListener('pointercancel', handlePointerCancel);
renderer.domElement.addEventListener('contextmenu', event => {
  const locationId = getPointerLocationId(event);
  if (!locationId) {
    return;
  }

  event.preventDefault();
  const context = findLocationGroupContextByLocationId(locationId);
  if (!context) {
    return;
  }

  if (context.isHub) {
    confirmAndRemoveLocationGroup(context.group.id);
    return;
  }

  removeSiteByLocationId(locationId);
});

let groupCounter = 1;
let hubIdCounter = 1;
let siteIdCounter = 1;

function nextGroupId() {
  return `group_${groupCounter++}`;
}

function nextHubId() {
  return `hub_${hubIdCounter++}`;
}

function nextSiteId() {
  return `site_${siteIdCounter++}`;
}

function refreshLocationCounters() {
  groupCounter = CONFIG.locations.groups.reduce((maxId, group) => {
    const match = /^group_(\d+)$/.exec(group.id || '');
    return match ? Math.max(maxId, Number(match[1])) : maxId;
  }, 0) + 1;

  hubIdCounter = CONFIG.locations.groups.reduce((maxId, group) => {
    const match = /^hub_(\d+)$/.exec(group?.hub?.id || '');
    return match ? Math.max(maxId, Number(match[1])) : maxId;
  }, 0) + 1;

  siteIdCounter = CONFIG.locations.groups.reduce((maxId, group) => {
    return Math.max(maxId, ...(group.sites || []).map(site => {
      const match = /^site_(\d+)$/.exec(site.id || '');
      return match ? Number(match[1]) : 0;
    }));
  }, 0) + 1;
}

function normalizeGroups(rawGroups) {
  if (!Array.isArray(rawGroups)) {
    return [];
  }

  const groups = rawGroups.map((rawGroup, index) => ({
    id: typeof rawGroup?.id === 'string' && rawGroup.id ? rawGroup.id : `group_${index + 1}`,
    hubName: typeof rawGroup?.hubName === 'string' && rawGroup.hubName.trim()
      ? rawGroup.hubName
      : `Hub ${index + 1}`,
    targetOtherHubs: typeof rawGroup?.targetOtherHubs === 'boolean'
      ? rawGroup.targetOtherHubs
      : !!rawGroup?.targetOtherGroups,
    hub: {
      id: typeof rawGroup?.hub?.id === 'string' && rawGroup.hub.id ? rawGroup.hub.id : '',
      lat: toFiniteNumber(rawGroup?.hub?.lat, DEFAULT_LOCATION_LATITUDE),
      lng: toFiniteNumber(rawGroup?.hub?.lng, DEFAULT_LOCATION_LONGITUDE),
      width: toFiniteNumber(rawGroup?.hub?.width, CONFIG.locations.hubDefaults.width),
      height: toFiniteNumber(rawGroup?.hub?.height, CONFIG.locations.hubDefaults.height)
    },
    sites: Array.isArray(rawGroup?.sites)
      ? rawGroup.sites.map((rawSite, siteIndex) => ({
        id: typeof rawSite?.id === 'string' && rawSite.id ? rawSite.id : `site_${index + 1}_${siteIndex + 1}`,
        lat: toFiniteNumber(rawSite?.lat, DEFAULT_LOCATION_LATITUDE),
        lng: toFiniteNumber(rawSite?.lng, DEFAULT_LOCATION_LONGITUDE),
        width: toFiniteNumber(rawSite?.width, CONFIG.locations.siteDefaults.width),
        height: toFiniteNumber(rawSite?.height, CONFIG.locations.siteDefaults.height)
      }))
      : []
  }));

  const usedGroupIds = new Set();
  const usedHubIds = new Set();
  const usedSiteIds = new Set();

  groups.forEach(group => {
    while (!group.id || usedGroupIds.has(group.id)) {
      group.id = `group_${groupCounter++}`;
    }
    usedGroupIds.add(group.id);

    while (!group.hub.id || usedHubIds.has(group.hub.id)) {
      group.hub.id = `hub_${hubIdCounter++}`;
    }
    usedHubIds.add(group.hub.id);

    group.sites.forEach(site => {
      while (!site.id || usedSiteIds.has(site.id)) {
        site.id = `site_${siteIdCounter++}`;
      }
      usedSiteIds.add(site.id);
    });
  });

  return groups;
}

function ensureValidClickToAddGroupId() {
  const groups = Array.isArray(CONFIG.locations.groups) ? CONFIG.locations.groups : [];
  if (!groups.length) {
    CONFIG.locations.clickToAddGroupId = '';
    return;
  }

  const hasSelectedGroup = groups.some(group => group?.id === CONFIG.locations.clickToAddGroupId);
  if (!hasSelectedGroup) {
    CONFIG.locations.clickToAddGroupId = groups[0].id;
  }
}

function importLocationSettingsFromText(jsonText) {
  let parsed;
  try {
    parsed = JSON.parse(jsonText);
  } catch {
    window.alert('Invalid JSON file.');
    return;
  }

  const normalizedInput = parsed?.locationSettings ?? parsed;

  const importedGroups = Array.isArray(normalizedInput?.groups)
    ? normalizedInput.groups
    : Array.isArray(normalizedInput?.locationGroups)
      ? normalizedInput.locationGroups
      : null;

  if (!Array.isArray(importedGroups)) {
    window.alert('File must contain "groups".');
    return;
  }

  if (typeof normalizedInput.showLocations === 'boolean') {
    CONFIG.locations.showLocations = normalizedInput.showLocations;
  }
  if (typeof normalizedInput.showDashes === 'boolean') {
    CONFIG.locations.showDashes = normalizedInput.showDashes;
  }
  if (typeof normalizedInput.editLocations === 'boolean') {
    CONFIG.locations.editLocations = normalizedInput.editLocations;
  }
  if (typeof normalizedInput.clickToAddGroupId === 'string') {
    CONFIG.locations.clickToAddGroupId = normalizedInput.clickToAddGroupId;
  }

  let shouldApplySiteSizeStyling = false;
  if (normalizedInput.styling && typeof normalizedInput.styling === 'object') {
    if (typeof normalizedInput.styling.hubColor === 'string') {
      CONFIG.locations.styling.hubColor = normalizedInput.styling.hubColor;
    }
    if (typeof normalizedInput.styling.dashColor === 'string') {
      CONFIG.locations.styling.dashColor = normalizedInput.styling.dashColor;
    }
    if (typeof normalizedInput.styling.siteColor === 'string') {
      CONFIG.locations.styling.siteColor = normalizedInput.styling.siteColor;
    }
    const importedSiteWidth = toFiniteNumber(normalizedInput.styling.siteWidth, Number.NaN);
    if (Number.isFinite(importedSiteWidth)) {
      CONFIG.locations.styling.siteWidth = importedSiteWidth;
      shouldApplySiteSizeStyling = true;
    }
    const importedSiteHeight = toFiniteNumber(normalizedInput.styling.siteHeight, Number.NaN);
    if (Number.isFinite(importedSiteHeight)) {
      CONFIG.locations.styling.siteHeight = importedSiteHeight;
      shouldApplySiteSizeStyling = true;
    }
  }

  CONFIG.locations.groups = normalizeGroups(importedGroups);
  if (shouldApplySiteSizeStyling) {
    applyGlobalSiteSizeStyling();
  }
  resetLocationUiExpansionState();
  ensureValidClickToAddGroupId();
  refreshLocationCounters();
  applyLocationSettings();
  refreshLocationUi();
}

function getCurrentConfigSnapshot(options = {}) {
  const { forceViewMode = true } = options;
  const snapshot = JSON.parse(JSON.stringify(CONFIG));
  if (forceViewMode && isPlainObject(snapshot?.locations)) {
    snapshot.locations.editLocations = false;
  }
  return snapshot;
}

async function loadStandaloneExporter() {
  if (!standaloneExportApiPromise) {
    standaloneExportApiPromise = import('./standalone-export.js')
      .then(module => {
        if (typeof module?.createStandaloneExportApi !== 'function') {
          throw new Error('standalone-export.js is missing createStandaloneExportApi().');
        }
        return module.createStandaloneExportApi({
          getCurrentConfigSnapshot,
          mainModuleUrl: import.meta.url
        });
      })
      .catch(error => {
        standaloneExportApiPromise = null;
        throw error;
      });
  }

  return standaloneExportApiPromise;
}

function clearScheduledGuiLoad() {
  if (!guiLoadIdleHandle) {
    return;
  }

  if (typeof window.cancelIdleCallback === 'function') {
    window.cancelIdleCallback(guiLoadIdleHandle);
  } else {
    window.clearTimeout(guiLoadIdleHandle);
  }
  guiLoadIdleHandle = 0;
}

function removeSettingsLauncherButton() {
  if (!settingsLauncherButton) {
    return;
  }
  settingsLauncherButton.remove();
  settingsLauncherButton = null;
}

function setSettingsLauncherButtonLoadingState(isLoading) {
  if (!settingsLauncherButton) {
    return;
  }
  settingsLauncherButton.disabled = isLoading;
  settingsLauncherButton.textContent = isLoading ? 'Loading...' : 'Settings';
}

function createSettingsLauncherButton() {
  if (!shouldEnableGui || settingsLauncherButton || isGuiLoaded) {
    return;
  }

  const existingButton = document.getElementById(SETTINGS_LAUNCHER_BUTTON_ID);
  if (existingButton instanceof HTMLButtonElement) {
    settingsLauncherButton = existingButton;
  } else {
    settingsLauncherButton = document.createElement('button');
    settingsLauncherButton.id = SETTINGS_LAUNCHER_BUTTON_ID;
    settingsLauncherButton.type = 'button';
    settingsLauncherButton.textContent = 'Settings';
    document.body.appendChild(settingsLauncherButton);
  }

  settingsLauncherButton.addEventListener('click', () => {
    void loadGuiIfAvailable();
  });
}

function scheduleGuiLoadOnIdle() {
  if (!shouldEnableGui || isGuiLoaded || guiLoadPromise || guiLoadIdleHandle) {
    return;
  }

  const load = () => {
    guiLoadIdleHandle = 0;
    void loadGuiIfAvailable();
  };

  if (typeof window.requestIdleCallback === 'function') {
    guiLoadIdleHandle = window.requestIdleCallback(load, { timeout: 1500 });
    return;
  }

  guiLoadIdleHandle = window.setTimeout(load, 900);
}

async function loadGuiIfAvailable() {
  if (!shouldEnableGui) {
    return false;
  }
  if (isGuiLoaded) {
    return true;
  }
  if (guiLoadPromise) {
    return guiLoadPromise;
  }

  setSettingsLauncherButtonLoadingState(true);
  clearScheduledGuiLoad();

  guiLoadPromise = (async () => {
    try {
      const guiModule = await import('./gui.js');
      if (typeof guiModule?.initGui !== 'function') {
        return false;
      }
      const nextGuiApi = guiModule.initGui({
        CONFIG,
        globe,
        locationDrag,
        DEFAULT_LOCATION_LATITUDE,
        DEFAULT_LOCATION_LONGITUDE,
        DASH_EASING_PRESETS,
        applyRendererSettings,
        applyControlsSettings,
        applyGlobeSettings,
        applyLocationSettings,
        applyGlobalSiteSizeStyling,
        updateLinkLayerVisibility: () => refreshLinkLayerVisibilityIfNeeded(true),
        cancelScheduledLocationSettingsApply,
        normalizeGroups,
        refreshLocationCounters,
        ensureValidClickToAddGroupId,
        getViewportCenterGlobeLatLng,
        confirmAndRemoveLocationGroup,
        removeSiteByLocationId,
        importLocationSettingsFromText,
        nextGroupId,
        nextHubId,
        nextSiteId,
        loadStandaloneExporter
      });
      if (nextGuiApi && typeof nextGuiApi === 'object') {
        guiApi.destroy();
        guiApi = {
          ...createNoopGuiApi(),
          ...nextGuiApi
        };
        isGuiLoaded = true;
        guiApi.refreshLocationUi();
        applyGlobeTransformSettings();
        guiApi.syncGlobeRotationUi();
        removeSettingsLauncherButton();
        return true;
      }
    } catch {
      // GUI is optional: run core app without it.
    } finally {
      setSettingsLauncherButtonLoadingState(false);
      guiLoadPromise = null;
    }
    return false;
  })();

  return guiLoadPromise;
}

refreshLocationCounters();
CONFIG.locations.groups = normalizeGroups(CONFIG.locations.groups);
applyGlobalSiteSizeStyling();
ensureValidClickToAddGroupId();
if (shouldEnableGui) {
  createSettingsLauncherButton();
  requestAnimationFrame(scheduleGuiLoadOnIdle);
}

async function loadDefaultLocationSettings() {
  try {
    const response = await fetch('./default-location-settings.json', { cache: 'no-store' });
    if (!response.ok) {
      applyLocationSettings();
      refreshLocationUi();
      applyGlobeSettings();
      syncGlobeRotationUi();
      return;
    }

    const jsonText = await response.text();
    importLocationSettingsFromText(jsonText);
    applyGlobeSettings();
    syncGlobeRotationUi();
  } catch (error) {
    console.warn('Could not load default-location-settings.json. Using in-code location defaults.', error);
    applyLocationSettings();
    refreshLocationUi();
    applyGlobeSettings();
    syncGlobeRotationUi();
  }
}

if (shouldSkipDefaultLocationSettingsFetch) {
  applyLocationSettings();
  refreshLocationUi();
  applyGlobeSettings();
  syncGlobeRotationUi();
} else {
  loadDefaultLocationSettings();
}

// Lifecycle
function onResize() {
  const width = window.innerWidth;
  const height = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
}
window.addEventListener('resize', onResize);

(function animate() {
  requestAnimationFrame(animate);
  let didRotationChange = false;
  if (!locationDrag.isActive && CONFIG.globe.enableAutoRotate) {
    CONFIG.globe.rotationY += CONFIG.globe.autoRotate;
    didRotationChange = true;
  }

  if (!locationDrag.isActive && !globeDrag.isActive && CONFIG.controls.enablePan) {
    const previousRotationX = CONFIG.globe.rotationX;
    const previousRotationY = CONFIG.globe.rotationY;
    CONFIG.globe.rotationY += globeDrag.velocityY;
    CONFIG.globe.rotationX += globeDrag.velocityX;

    const inertiaDecay = CONFIG.controls.enableDamping
      ? 1 - Math.min(0.25, Math.max(0.01, CONFIG.controls.dampingFactor))
      : 0.92;

    globeDrag.velocityX *= inertiaDecay;
    globeDrag.velocityY *= inertiaDecay;

    if (Math.abs(globeDrag.velocityX) < 0.00001) {
      globeDrag.velocityX = 0;
    }
    if (Math.abs(globeDrag.velocityY) < 0.00001) {
      globeDrag.velocityY = 0;
    }

    if (
      Math.abs(CONFIG.globe.rotationX - previousRotationX) > 1e-8
      || Math.abs(CONFIG.globe.rotationY - previousRotationY) > 1e-8
    ) {
      didRotationChange = true;
    }
  }

  applyGlobeTransformSettings();
  const rotationChangedSinceLastFrame = (
    Math.abs(CONFIG.globe.rotationX - animationState.lastRotationX) > 1e-8
    || Math.abs(CONFIG.globe.rotationY - animationState.lastRotationY) > 1e-8
  );
  if (didRotationChange || rotationChangedSinceLastFrame) {
    animationState.lastRotationX = CONFIG.globe.rotationX;
    animationState.lastRotationY = CONFIG.globe.rotationY;
    if (isGuiLoaded) {
      syncGlobeRotationUi();
    }
  }

  refreshLinkLayerVisibilityIfNeeded();
  if (linkDashLayer.group.visible && linkDashLayer.links.length && CONFIG.locations.linkSettings.arcDashAnimateTime > 0) {
    const nowMs = performance.now();
    updateLinkDashMeshes(nowMs);
  }

  if (controls.enableZoom) {
    controls.update();
  }
  renderer.render(scene, camera);
})();
